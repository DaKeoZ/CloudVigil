# ==============================================================================
# CloudVigil — Nginx Reverse Proxy
# ==============================================================================
# Topologie :
#   HTTPS :443  →  /api/*   →  FastAPI  (server:8000)   [strip /api préfixe]
#               →  /*       →  Next.js  (frontend:3000)
#   HTTP  :80   →  redirect HTTPS (301)
#
# Rate limiting :
#   /api/auth/token → 10 req/min  (protection brute-force)
#   /api/*          → 120 req/min (protection DDoS)
# ==============================================================================

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Sécurité : masquer la version Nginx ────────────────────────────────────
    server_tokens off;

    # ── Rate limiting (buckets partagés entre les workers) ────────────────────
    limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m  rate=10r/m;
    limit_req_log_level warn;
    limit_req_status    429;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream fastapi {
        server server:8000;
        keepalive 32;
    }

    upstream nextjs {
        server frontend:3000;
        keepalive 32;
    }

    # ── En-têtes de sécurité communs ──────────────────────────────────────────
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'";
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Serveur HTTP → redirection HTTPS
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }

        # Healthcheck Nginx (sans redirection, utile pour docker-compose)
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Serveur HTTPS principal
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # ── Certificat TLS (auto-signé en dev) ────────────────────────────────
        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # ── Protocoles et suites de chiffrement recommandés (Mozilla Modern) ──
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # ── Session TLS (améliore les performances) ───────────────────────────
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── En-têtes de sécurité HTTP ─────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                               always;
        add_header X-Frame-Options           SAMEORIGIN                            always;
        add_header X-XSS-Protection          "1; mode=block"                      always;
        add_header Referrer-Policy           strict-origin-when-cross-origin       always;

        # ── Taille max des requêtes ───────────────────────────────────────────
        client_max_body_size 1m;

        # ── Timeouts ─────────────────────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # ── En-têtes transmis aux upstreams ──────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # ══════════════════════════════════════════════════════════════════════
        # /api/auth/token — Rate limit strict (anti brute-force)
        # ══════════════════════════════════════════════════════════════════════
        location /api/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://fastapi;
            proxy_set_header Connection "";
        }

        # ══════════════════════════════════════════════════════════════════════
        # /api/* — API FastAPI (tous les autres endpoints)
        # ══════════════════════════════════════════════════════════════════════
        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://fastapi;
            proxy_set_header Connection "";

            # Désactiver le buffering pour les réponses JSON temps-réel
            proxy_buffering    off;
            proxy_cache_bypass $http_upgrade;
        }

        # ══════════════════════════════════════════════════════════════════════
        # / — Frontend Next.js (tout le reste)
        # ══════════════════════════════════════════════════════════════════════
        location / {
            proxy_pass http://nextjs;

            # Support WebSocket (Next.js HMR en développement)
            proxy_set_header Upgrade   $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffering off;
        }

        # ── Gestion des erreurs ───────────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"error":"Trop de requêtes. Réessayez dans quelques instants."}';
            add_header Content-Type application/json always;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 503 '{"error":"Service temporairement indisponible."}';
            add_header Content-Type application/json always;
        }
    }
}
