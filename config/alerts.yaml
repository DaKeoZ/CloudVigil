# ══════════════════════════════════════════════════════════════════════════════
# CloudVigil — Configuration des alertes
# ══════════════════════════════════════════════════════════════════════════════
#
# Chaque règle définit :
#   metric            : cpu_usage | ram_usage | disk_usage
#   operator          : > | >= | < | <=
#   threshold         : valeur seuil en pourcent (0–100)
#   duration_minutes  : durée minimale de dépassement pour déclencher une alerte
#   cooldown_minutes  : délai avant une nouvelle alerte sur la même règle/nœud
#   severity          : info | warning | critical
#
# Webhooks : renseigner l'URL et passer enabled à true pour activer.

# ── Règles d'alerte ───────────────────────────────────────────────────────────
rules:

  - name: "CPU critique"
    metric: cpu_usage
    operator: ">"
    threshold: 90.0
    duration_minutes: 5      # Le CPU doit dépasser 90 % pendant 5 min consécutives
    cooldown_minutes: 30
    severity: critical

  - name: "CPU élevé"
    metric: cpu_usage
    operator: ">"
    threshold: 75.0
    duration_minutes: 10
    cooldown_minutes: 30
    severity: warning

  - name: "RAM critique"
    metric: ram_usage
    operator: ">"
    threshold: 90.0
    duration_minutes: 5
    cooldown_minutes: 30
    severity: critical

  - name: "RAM élevée"
    metric: ram_usage
    operator: ">"
    threshold: 80.0
    duration_minutes: 10
    cooldown_minutes: 30
    severity: warning

  - name: "Disque critique"
    metric: disk_usage
    operator: ">"
    threshold: 95.0
    duration_minutes: 1      # Disque plein → alerte quasi immédiate
    cooldown_minutes: 60
    severity: critical

# ── Destinations des notifications ────────────────────────────────────────────
# ── Auto-réparation des conteneurs ────────────────────────────────────────────
# Si un conteneur listé est dans un état non-running (exited, dead, oomkilled…),
# le Master envoie automatiquement une commande restart à l'agent concerné.
# Un cooldown empêche les redémarrages en boucle.
auto_repair:
  enabled: true
  cooldown_minutes: 10      # Délai min entre deux restarts du même conteneur
  restart_timeout_s: 10     # Secondes accordées au conteneur pour s'arrêter proprement

  # Conteneurs critiques à surveiller (matching par sous-chaîne, insensible à la casse)
  containers:
    - name_pattern: "nginx"
    - name_pattern: "my-api"
    # Ajouter d'autres conteneurs critiques ici

# ── Supervision réseau (Network Health) ───────────────────────────────────────
# CloudVigil "ping" ces URLs toutes les `interval_seconds` secondes.
# Pour chaque cible HTTPS, il vérifie aussi l'expiration du certificat SSL.
# Une alerte webhook est envoyée si :
#   - La cible est injoignable (status != 2xx ou timeout)
#   - Le certificat SSL expire dans moins de `ssl_warning_days` jours
network_checks:
  enabled: true
  interval_seconds: 60      # Fréquence des sondes
  timeout_seconds: 10       # Timeout HTTP par requête
  ssl_warning_days: 7       # Alerte critique si cert expire dans < N jours
  cooldown_minutes: 60      # Cooldown entre deux alertes sur la même URL

  targets:
    - url: "https://www.google.com"
      name: "Google"
    - url: "https://api.github.com"
      name: "GitHub API"
    # Ajouter vos propres URLs ici :
    # - url: "https://monsite.com"
    #   name: "Mon Site"
    # - url: "https://api.monsite.com/health"
    #   name: "API Prod"

# ── Destinations des notifications ────────────────────────────────────────────
webhooks:

  slack:
    enabled: false
    # Créer un Incoming Webhook sur https://api.slack.com/messaging/webhooks
    url: "https://hooks.slack.com/services/TXXXXXXXX/BXXXXXXXX/XXXXXXXXXXXXXXXXXXXXXXXX"

  discord:
    enabled: false
    # Créer un Webhook dans Paramètres du salon → Intégrations → Webhooks
    url: "https://discord.com/api/webhooks/XXXXXXXXXX/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
